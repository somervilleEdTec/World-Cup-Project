# Quality gate for Debug branch — does NOT deploy. See docs/DEPLOY_CONTROL_PLANE.md

name: CI Debug

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [Debug]
  pull_request:
    branches: [main, Debug]

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install, test, build
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm test
          npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8787
          DEBUG_LOCAL: '1'
