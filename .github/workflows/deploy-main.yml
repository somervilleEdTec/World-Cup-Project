# LIVE SITE ONLY — runs on push to `main` (never on `Debug`).
# GitHub is the control plane: CI → SSH deploy → verify. See docs/DEPLOY_CONTROL_PLANE.md

name: Deploy main (production)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LIVE_SITE_URL: https://worldcup.dosums.uk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install and test
        run: |
          set -euo pipefail
          npm ci
          npm run format:check
          npm run lint
          npm test
          npm run build
        env:
          VITE_API_BASE_URL: https://ci-placeholder.local

  deploy:
    name: Deploy to production host
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    outputs:
      deploy_commit: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify branch is main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Deploy blocked: GITHUB_REF=${GITHUB_REF} (main only)"
            exit 1
          fi

      - name: Check deploy secrets are configured
        run: |
          missing=0
          check() { if [ -z "$1" ]; then echo "  MISSING: $2"; missing=1; else echo "  OK: $2"; fi; }
          check "${{ secrets.DEPLOY_HOST }}" "DEPLOY_HOST"
          check "${{ secrets.DEPLOY_USER }}" "DEPLOY_USER"
          check "${{ secrets.DEPLOY_SSH_KEY }}" "DEPLOY_SSH_KEY"
          check "${{ secrets.DEPLOY_PATH }}" "DEPLOY_PATH"
          if [ "${missing}" -ne 0 ]; then
            echo ""
            echo "Add repository secrets: GitHub → Settings → Secrets and variables → Actions"
            echo "Guide: docs/DEPLOY_CONTROL_PLANE.md"
            exit 1
          fi

      - name: Validate DEPLOY_SSH_KEY format
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q '^-----BEGIN '; then
            echo "ERROR: DEPLOY_SSH_KEY is not a valid private key."
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q 'PRIVATE KEY-----'; then
            echo "ERROR: DEPLOY_SSH_KEY is missing -----END ... PRIVATE KEY-----"
            exit 1
          fi
          key_bytes="$(printf '%s' "$DEPLOY_SSH_KEY" | wc -c | tr -d ' ')"
          if [ "${key_bytes}" -lt 200 ]; then
            echo "ERROR: DEPLOY_SSH_KEY is too short (${key_bytes} bytes)."
            exit 1
          fi
          echo "OK: DEPLOY_SSH_KEY looks valid (${key_bytes} bytes)."

      - name: Configure SSH (Oracle host key + keepalive)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: bash scripts/ci-ssh-setup.sh

      - name: Deploy over SSH (retry; optional if VM pull timer is active)
        id: ssh_deploy
        continue-on-error: true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          EXPECTED_COMMIT: ${{ github.sha }}
          SSH_MAX_ATTEMPTS: 3
          SSH_RETRY_WAIT_SEC: 45
        timeout-minutes: 55
        run: |
          set -euo pipefail
          bash scripts/ci-ssh-exec.sh "cd '${DEPLOY_PATH}' && export EXPECTED_COMMIT='${EXPECTED_COMMIT}' && echo GITHUB_SHA=\${EXPECTED_COMMIT} && bash scripts/deploy-production.sh"

      - name: SSH deploy result
        if: always()
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
            echo "SSH deploy succeeded."
          else
            echo "SSH deploy did not complete — waiting for VM pull timer (worldcup-deploy.timer, ~3 min) if enabled."
            echo "Enable once on VM: bash scripts/ensure-poll-deploy-timer.sh"
          fi

      - name: Verify live site (public health)
        timeout-minutes: 35
        run: |
          set -euo pipefail
          expected="${GITHUB_SHA}"
          url="${LIVE_SITE_URL}/api/health"
          echo "Checking ${url} for commit ${expected}"
          echo "Allowing up to ~30 min for pull-based deploy if SSH was blocked."
          for attempt in $(seq 1 60); do
            http_code="$(curl -s -o /tmp/health.json -w '%{http_code}' --max-time 15 "${url}" 2>/dev/null || echo 000)"
            body="$(cat /tmp/health.json 2>/dev/null || true)"
            if [ "${http_code}" = "530" ] || [ "${http_code}" = "502" ] || [ "${http_code}" = "503" ]; then
              if printf '%s' "${body}" | grep -q '1033'; then
                echo "Attempt ${attempt}: HTTP ${http_code} (1033) — Cloudflare Tunnel (cloudflared) likely down; Node may still be healthy on :8787."
              else
                echo "Attempt ${attempt}: HTTP ${http_code} — origin unreachable (check cloudflared, worldcup.service, nginx)."
              fi
            elif [ -n "${body}" ]; then
              echo "Response (HTTP ${http_code}): ${body}"
              if printf '%s' "${body}" | grep -qF '"ok":true' && printf '%s' "${body}" | grep -qF "\"commit\":\"${expected}\""; then
                echo "OK: live site reports deployed commit."
                exit 0
              fi
            else
              echo "Attempt ${attempt}: curl failed (HTTP ${http_code})"
            fi
            sleep 30
          done
          echo "ERROR: ${url} did not return ok:true with commit ${expected} within ~30 min."
          echo "Recovery guide: docs/OUTAGE_RECOVERY.md"
          echo "1. Re-run this workflow (restarts cloudflared + worldcup via deploy-production.sh)."
          echo "2. If SSH deploy succeeded but health failed: on VM run bash scripts/restart-production-services.sh"
          echo "3. If body contains 1033: sudo systemctl restart cloudflared on the VM."
          echo "If SSH failed with 'handshake failed: EOF': wait for pull timer (~3 min) or re-run workflow."
          exit 1

  report:
    name: Deploy summary
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - run: |
          echo "## Production deploy succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Live:** ${{ env.LIVE_SITE_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Workflow:** Deploy main (production)" >> "$GITHUB_STEP_SUMMARY"
