# LIVE SITE ONLY — runs on push to `main` (never on `Debug`).
# Setup: docs/DEPLOY_AUTOMATION.md

name: Deploy main (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://ci-placeholder.local

  deploy:
    name: Deploy to production host
    needs: ci
    runs-on: ubuntu-latest
    # Hard gate: never deploy from Debug or other branches (including manual dispatch).
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Verify branch is main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Deploy blocked: GITHUB_REF=${GITHUB_REF} (main only)"
            exit 1
          fi

      - name: Check deploy secrets are configured
        run: |
          missing=0
          check() { if [ -z "$1" ]; then echo "  MISSING: $2"; missing=1; else echo "  OK: $2"; fi; }
          check "${{ secrets.DEPLOY_HOST }}" "DEPLOY_HOST"
          check "${{ secrets.DEPLOY_USER }}" "DEPLOY_USER"
          check "${{ secrets.DEPLOY_SSH_KEY }}" "DEPLOY_SSH_KEY"
          check "${{ secrets.DEPLOY_PATH }}" "DEPLOY_PATH"
          if [ "${missing}" -ne 0 ]; then
            echo ""
            echo "Add repository secrets: GitHub → Settings → Secrets and variables → Actions"
            echo "Guide: docs/DEPLOY_AUTOMATION.md"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 20m
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            bash scripts/deploy-production.sh
