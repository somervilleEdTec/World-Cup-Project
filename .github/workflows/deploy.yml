# Deploy to production when main is updated (after CI passes).
# One-time setup: docs/DEPLOY_AUTOMATION.md

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Placeholder for CI; production build uses VITE_API_BASE_URL on the server.
          VITE_API_BASE_URL: https://ci-placeholder.local

  deploy:
    name: Deploy to production host
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            if [[ -z "${DEPLOY_PATH:-}" ]]; then
              echo "DEPLOY_PATH secret is not set. See docs/DEPLOY_AUTOMATION.md"
              exit 1
            fi
            cd "${DEPLOY_PATH}"
            bash scripts/deploy-production.sh
